# Render Blueprint — https://render.com/docs/blueprint-spec
#
# Foray (a mushrooming field book) is a Next.js 15 static export.
# `output: 'export'` in next.config.ts produces a fully static site in `./out`,
# so we deploy as a Render Static Site (free tier compatible, global CDN).
#
# Deploy by either:
#   1. Click "New +" → "Blueprint" in Render, point at this repo, OR
#   2. `render blueprint launch` from the Render CLI.

services:
  - type: web
    name: mushroom-rain-tracker
    runtime: static
    # Install pnpm via corepack so we honor the project's pnpm-lock.yaml.
    # --no-lint matches the local build script.
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm build
    staticPublishPath: ./out
    pullRequestPreviewsEnabled: true
    autoDeploy: true
    buildFilter:
      paths:
        - app/**
        - components/**
        - lib/**
        - public/**
        - package.json
        - pnpm-lock.yaml
        - next.config.ts
        - tsconfig.json
        - tailwind.config.ts
        - postcss.config.mjs
        - render.yaml
    headers:
      # Security baseline
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: geolocation=(self), camera=(), microphone=(), payment=()
      # Long-cache Next.js hashed assets
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Fonts can also live forever
      - path: /fonts/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      # Static images
      - path: /*.{png,jpg,jpeg,svg,ico,webp,avif}
        name: Cache-Control
        value: public, max-age=86400, must-revalidate
      # HTML should always revalidate so deploys take effect immediately
      - path: /
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /*.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      # SPA-style fallback for any unmatched path → serve 404 page
      - type: rewrite
        source: /*
        destination: /404.html
